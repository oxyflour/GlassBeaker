<html>
<body>
<style>
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.beaker-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}

.beaker {
    position: relative;
    width: 80px;
    height: 120px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top: none;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.05);
}

.beaker::before {
    content: '';
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    height: 6px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-radius: 10px;
}

.liquid {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70%;
    background: linear-gradient(180deg, #00d4ff 0%, #0099cc 100%);
    animation: liquidWave 2s ease-in-out infinite;
}

.liquid::before {
    content: '';
    position: absolute;
    top: -10px;
    left: 0;
    right: 0;
    height: 20px;
    background: inherit;
    border-radius: 50%;
    animation: wave 2s ease-in-out infinite;
}

.bubble {
    position: absolute;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    animation: bubble-rise 1.5s ease-in infinite;
}

.bubble:nth-child(1) {
    width: 8px;
    height: 8px;
    left: 20%;
    bottom: 0;
    animation-delay: 0s;
}

.bubble:nth-child(2) {
    width: 6px;
    height: 6px;
    left: 50%;
    bottom: 0;
    animation-delay: 0.3s;
}

.bubble:nth-child(3) {
    width: 10px;
    height: 10px;
    left: 70%;
    bottom: 0;
    animation-delay: 0.6s;
}

.bubble:nth-child(4) {
    width: 5px;
    height: 5px;
    left: 35%;
    bottom: 0;
    animation-delay: 0.9s;
}

.bubble:nth-child(5) {
    width: 7px;
    height: 7px;
    left: 60%;
    bottom: 0;
    animation-delay: 1.2s;
}

.loading-text {
    color: rgba(255, 255, 255, 0.8);
    font-size: 16px;
    letter-spacing: 2px;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes liquidWave {
    0%, 100% {
        height: 65%;
    }
    50% {
        height: 75%;
    }
}

@keyframes wave {
    0%, 100% {
        transform: translateY(0) scaleY(1);
    }
    50% {
        transform: translateY(-5px) scaleY(1.1);
    }
}

@keyframes bubble-rise {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    90% {
        opacity: 0.6;
    }
    100% {
        transform: translateY(-100px) scale(0.5);
        opacity: 0;
    }
}

@keyframes pulse {
    0%, 100% {
        opacity: 0.4;
    }
    50% {
        opacity: 1;
    }
}
</style>

<div class="beaker-container">
    <div class="beaker">
        <div class="liquid">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </div>
    <p class="loading-text">Loading</p>
</div>

</body>
</html>
